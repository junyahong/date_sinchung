<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title> 5월3일 데이트신청❤️ </title>

<style>
* { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }
button { -webkit-appearance: none; appearance: none; font: inherit; }

body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:24px;
  overflow:hidden;

  background-image:
    linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
    url("https://images.unsplash.com/photo-1518199266791-5375a83190b7?q=80&w=1000&auto=format&fit=crop");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  transition: background-image .8s ease;

  font-family: system-ui, -apple-system, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
}

.card{
  width:100%;
  max-width:400px;
  min-height: 250px; /* 버튼이 움직일 공간 확보 */
  background:rgba(255,255,255,.95);
  backdrop-filter: blur(10px);
  border-radius:24px;
  padding:40px 32px;
  text-align:center;
  box-shadow:0 20px 50px rgba(0,0,0,.25);
  position:relative;
  z-index:10;
  overflow: hidden; /* 버튼이 카드 밖으로 나가지 않게 */
}

h1{
  font-size:22px;
  line-height:1.6;
  margin:0 0 32px;
  color: #333;
  word-break: keep-all;
}

.btn-container{
  position:relative;
  width:100%;
  height:100px; /* 카드 내부 도망 범위 설정 */
  margin-top: 20px;
  touch-action: none;
}

.btn{
  position:absolute;
  width:100px;
  height:45px;
  border:none;
  border-radius:30px;
  font-size:16px;
  font-weight: 600;
  cursor:pointer;
  user-select:none;
  z-index:20;
  transition: transform .1s ease, left 0.2s ease, top 0.2s ease;
}

.yes{ 
  left: 10px;
  top: 0;
  background:#ff4d6d; 
  color:#fff; 
  box-shadow: 0 4px 15px rgba(255, 77, 109, 0.3);
}

.no { 
  right: 10px;
  top: 0;
  background:#e0e0e0; 
  color:#666; 
}

.result{
  margin-top:24px;
  font-size:19px;
  font-weight:700;
  color:#ff4d6d;
  display:none;
  line-height: 1.5;
  word-break: keep-all;
  animation: fadeInDown 0.6s ease-out forwards;
}

@keyframes fadeInDown {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

.heart{
  position:fixed;
  pointer-events:none;
  animation: floatUp 3s ease-out forwards;
  z-index:5;
}

@keyframes floatUp{
  0%{ transform:translateY(0) scale(1); opacity:1; }
  100%{ transform:translateY(-100vh) scale(1.5); opacity:0; }
}
</style>
</head>

<body>
  <div class="card">
    <h1>
      예린아 너무 보고싶어❤️<br>
      나랑 5월 3일에 데이트하자!!
    </h1>

    <div class="btn-container" id="btnArea">
      <button class="btn yes" id="yesBtn" type="button">Yes</button>
      <button class="btn no" id="noBtn" type="button">No</button>
    </div>

    <div class="result" id="result">좋아! 그날 맛있는 거 먹으러 가자 ❤️</div>
  </div>

<script>
(function () {
  const yesBtn = document.getElementById("yesBtn");
  const noBtn  = document.getElementById("noBtn");
  const result = document.getElementById("result");
  const btnArea = document.getElementById("btnArea");

  yesBtn.addEventListener("click", () => {
    document.body.style.backgroundImage =
      'linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url("https://images.unsplash.com/photo-1516589174184-c6852661bbf3?q=80&w=1000&auto=format&fit=crop")';
    
    if (result) result.style.display = "block";
    
    noBtn.style.display = "none";
    yesBtn.style.position = "relative";
    yesBtn.style.width = "100%";
    yesBtn.style.left = "0";
    yesBtn.innerText = "5월 3일에 만나! 🥰";
    
    createHearts();
  });

  function createHearts(){
    for(let i=0; i<30; i++){
      setTimeout(() => {
        const h = document.createElement("div");
        h.className = "heart";
        h.textContent = "❤️";
        h.style.left = (Math.random() * 100) + "vw";
        h.style.bottom = "-5vh";
        h.style.fontSize = (Math.random() * 20 + 20) + "px";
        document.body.appendChild(h);
        setTimeout(() => h.remove(), 3000);
      }, i * 150);
    }
  }

  // No 버튼 도망치기 (흰색 카드 안의 btnArea 영역으로 한정)
  function moveNo(){
    const maxX = btnArea.clientWidth - noBtn.offsetWidth;
    const maxY = btnArea.clientHeight - noBtn.offsetHeight;

    // 영역 내에서 랜덤 위치 계산
    const x = Math.max(0, Math.random() * maxX);
    const y = Math.max(0, Math.random() * maxY);

    noBtn.style.left = x + "px";
    noBtn.style.top  = y + "px";
  }

  noBtn.addEventListener("mouseenter", moveNo);
  noBtn.addEventListener("touchstart", (e) => {
    e.preventDefault();
    moveNo();
  }, { passive:false });

  noBtn.addEventListener("click", (e) => {
    e.preventDefault();
    moveNo();
  });

})();
</script>
</body>
</html>
